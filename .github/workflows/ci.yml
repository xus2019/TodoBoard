name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.3.app

      - name: Show Swift version
        run: swift --version

      - name: Build
        run: swift build -c debug

      - name: Test
        run: |
          HOME=$PWD/.home \
          CLANG_MODULE_CACHE_PATH=$PWD/.cache/clang \
          swift test --disable-sandbox --build-path .build-ci
