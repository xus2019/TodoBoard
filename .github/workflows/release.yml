name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    name: Build DMG & Publish Release
    runs-on: macos-14
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build release binary
        run: swift build -c release

      - name: Build .app bundle
        run: |
          chmod +x scripts/build-app.sh
          scripts/build-app.sh "${{ steps.version.outputs.VERSION }}"

      - name: Create DMG
        run: |
          hdiutil create \
            -volname "TodoBoard" \
            -srcfolder "build/TodoBoard.app" \
            -ov \
            -format UDZO \
            "build/TodoBoard-${{ steps.version.outputs.VERSION }}.dmg"

      - name: Compute SHA256
        id: sha256
        run: |
          CHECKSUM=$(shasum -a 256 "build/TodoBoard-${{ steps.version.outputs.VERSION }}.dmg" | awk '{print $1}')
          echo "CHECKSUM=$CHECKSUM" >> $GITHUB_OUTPUT
          echo "$CHECKSUM  TodoBoard-${{ steps.version.outputs.VERSION }}.dmg" > "build/TodoBoard-${{ steps.version.outputs.VERSION }}.dmg.sha256"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "TodoBoard v${{ steps.version.outputs.VERSION }}"
          body: |
            ## TodoBoard v${{ steps.version.outputs.VERSION }}

            ### Installation / 安装
            1. Download `TodoBoard-${{ steps.version.outputs.VERSION }}.dmg`
            2. Open the DMG and drag **TodoBoard.app** to Applications
            3. First launch: right-click → **Open** to bypass Gatekeeper

            ### SHA256 Checksum
            ```
            ${{ steps.sha256.outputs.CHECKSUM }}  TodoBoard-${{ steps.version.outputs.VERSION }}.dmg
            ```

            ---
            See [CHANGELOG.md](https://github.com/xus2019/TodoBoard/blob/main/CHANGELOG.md) for details.
          files: |
            build/TodoBoard-${{ steps.version.outputs.VERSION }}.dmg
            build/TodoBoard-${{ steps.version.outputs.VERSION }}.dmg.sha256
          draft: false
          prerelease: false
